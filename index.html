<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çarkıfelek Bilgi Oyunu</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Çark Oyunu">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-gray: #8E8E93;
            --text-dark: #1C1C1E;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--text-dark);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100dvh; 
            padding-bottom: env(safe-area-inset-bottom); 
        }

        /* Screens */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .screen.active { display: flex; }

        /* Setup Screen */
        .setup-container {
            background: var(--card-bg); border-radius: 16px; padding: 24px;
            margin: auto; width: 90%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            max-height: 90vh; overflow-y: auto;
        }
        
        h1, h2 { text-align: center; margin-bottom: 24px; font-weight: 700; }

        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: var(--ios-gray); }
        
        .ios-input {
            width: 100%; padding: 14px; border: 1px solid #E5E5EA;
            border-radius: 12px; font-size: 16px; background: var(--ios-bg);
        }

        .ios-button {
            width: 100%; padding: 16px; background-color: var(--ios-blue);
            color: white; border: none; border-radius: 12px; font-size: 17px;
            font-weight: 600; cursor: pointer; margin-top: 15px;
        }
        .ios-button:active { opacity: 0.8; }

        #playerNamesInputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

        /* --- GAME SCREEN OYUNCU VE ÇARK DÜZENİ --- */
        #gameScreen { justify-content: space-between; padding: 10px; }

        .active-player-header {
            text-align: center; font-size: 18px; font-weight: 700; padding: 10px;
            color: var(--ios-blue); background: var(--card-bg); border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px;
        }

        .wheel-container { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            width: 100%; min-height: 0; margin-bottom: 10px; position: relative;
        }
        #wheelCanvas { 
            max-width: 100%; max-height: 100%; aspect-ratio: 1; 
            border-radius: 50%; touch-action: none; 
            /* Gölge efektlerini canvas içine aldığımız için burayı temizledik */
        }

        /* Alt kısımdaki oyuncu skorları */
        .scores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 5px; max-height: 30%; overflow-y: auto; }
        .score-card { background: var(--card-bg); padding: 10px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 2px solid transparent; }
        .score-card.active { border-color: var(--ios-blue); background: #E5F1FF; }
        .score-card.finished { opacity: 0.5; border-color: var(--ios-green); }
        .score-card .name { font-weight: 600; font-size: 14px; color: var(--ios-gray); max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .score-card .points { font-size: 16px; font-weight: 800; color: var(--text-dark); }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .ios-modal { background: var(--card-bg); width: 85%; max-width: 340px; border-radius: 18px; text-align: center; overflow: hidden; box-shadow: 0 24px 48px rgba(0,0,0,0.2); transform: scale(0.95); }
        .modal-overlay.show .ios-modal { transform: scale(1); }
        .modal-content { padding: 24px 20px; }
        .modal-title { font-weight: 700; font-size: 20px; margin-bottom: 12px; }
        .modal-text { font-size: 16px; line-height: 1.4; color: var(--text-dark); margin-bottom: 15px; }
        
        /* CEVAP GİZLEME (BOYA) EFEKTİ CSS */
        .answer-wrapper {
            position: relative; margin-top: 20px; min-height: 70px; background: #f9f9f9;
            border-radius: 12px; border: 2px dashed #ccc; cursor: pointer; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .answer-cover {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(45deg, #FFD54F, #FFD54F 15px, #FFCA28 15px, #FFCA28 30px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-weight: 800; font-size: 15px; color: #B27900; z-index: 2;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
        }
        .answer-wrapper.revealed .answer-cover {
            transform: scale(1.3) translateY(-20px); opacity: 0; pointer-events: none;
        }
        .modal-answer {
            font-size: 18px; font-weight: 800; color: var(--ios-green);
            opacity: 0; transition: opacity 0.3s; transition-delay: 0.1s;
        }
        .answer-wrapper.revealed .modal-answer { opacity: 1; }

        .modal-buttons { display: flex; border-top: 1px solid #E5E5EA; }
        .modal-btn { flex: 1; padding: 16px; background: transparent; border: none; font-size: 17px; color: var(--ios-blue); font-weight: 600; cursor: pointer; text-align: center;}
        .modal-btn:first-child { border-right: 1px solid #E5E5EA; }
        .modal-btn.danger { color: var(--ios-red); }

        /* Leaderboard */
        .leaderboard-list { margin-top: 20px; width: 100%; max-width: 400px; margin-inline: auto; }
        .leaderboard-item { display: flex; justify-content: space-between; background: var(--card-bg); padding: 16px; border-radius: 12px; margin-bottom: 12px; font-weight: 700; font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);}
        .rank-1 { background: #FFD700; color: #000; } .rank-2 { background: #E0E0E0; color: #000; } .rank-3 { background: #CD7F32; color: #FFF; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="setupScreen" class="screen active" style="padding: 20px;">
        <div class="setup-container">
            <h1>Çarkıfelek</h1>
            
            <div class="input-group">
                <label>Bitiş Puanı</label>
                <input type="number" id="targetScore" class="ios-input" value="500">
            </div>
            
            <div class="input-group">
                <label>Tur Süresi (Saniye)</label>
                <input type="number" id="turnTime" class="ios-input" value="30">
            </div>

            <div class="input-group">
                <label>Soru Okunurken Süre:</label>
                <select id="timerPauseBehavior" class="ios-input">
                    <option value="pause" selected>Süre Dursun (Kolay)</option>
                    <option value="continue">Süre Aksın (Zor)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Oyuncu Sayısı</label>
                <select id="playerCount" class="ios-input" onchange="generatePlayerInputs()">
                    <option value="1">1 Oyuncu</option>
                    <option value="2" selected>2 Oyuncu</option>
                    <option value="3">3 Oyuncu</option>
                    <option value="4">4 Oyuncu</option>
                    <option value="5">5 Oyuncu</option>
                    <option value="6">6 Oyuncu</option>
                </select>
            </div>
            <div id="playerNamesInputs"></div>
            <button class="ios-button" onclick="startGame()">Oyuna Başla</button>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="active-player-header" id="activePlayerDisplay">
            Sıra: Bekleniyor <br>
            <span id="timerSpan" style="font-size: 15px; font-weight: 600; color: var(--ios-gray); display: inline-block; margin-top: 5px;">Kalan Süre: --</span>
        </div>
        
        <div class="wheel-container">
            <canvas id="wheelCanvas" width="800" height="800"></canvas>
        </div>

        <div class="scores-grid" id="scoresGrid"></div>
    </div>

    <div id="leaderboardScreen" class="screen" style="padding: 20px;">
        <h1 style="text-align: center;">Oyun Bitti!</h1>
        <h2 style="text-align: center; color: var(--ios-gray); margin-bottom: 20px;">Liderlik Tablosu</h2>
        <div class="leaderboard-list" id="leaderboardList"></div>
        <button class="ios-button" style="margin-top:auto; max-width:400px; margin-inline:auto;" onclick="location.reload()">Yeni Oyun</button>
    </div>

    <div id="alertModal" class="modal-overlay">
        <div class="ios-modal">
            <div class="modal-content">
                <div class="modal-title" id="alertTitle">Başlık</div>
                <div class="modal-text" id="alertText">Metin</div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn" style="border:none;" onclick="closeAlertAndNext()">Tamam</button>
            </div>
        </div>
    </div>

    <div id="questionModal" class="modal-overlay">
        <div class="ios-modal">
            <div class="modal-content">
                <div class="modal-title" id="questionValueTitle">Değer</div>
                <div class="modal-text" id="questionText">Soru metni...</div>
                
                <div class="answer-wrapper" id="answerWrapper" onclick="revealAnswer()">
                    <div class="answer-cover" id="answerCover">
                        <span style="font-size: 24px; margin-bottom: 5px;">👆</span>
                        Cevabı Görmek İçin Dokun
                    </div>
                    <div class="modal-answer" id="answerText">Cevap...</div>
                </div>

            </div>
            <div class="modal-buttons">
                <button class="modal-btn danger" onclick="handleAnswer(false)">Bilemedi</button>
                <button class="modal-btn" onclick="handleAnswer(true)">Bildi</button>
            </div>
        </div>
    </div>

    <script src="bilgi.js"></script>
    <script>
        // İstenilen Görseldeki Canlı Renk Paleti Uygulandı
        const segmentsData = [
            { text: "10", val: 10, weight: 5, color: '#03A9F4' }, // Mavi
            { text: "20", val: 20, weight: 4, color: '#4CAF50' }, // Yeşil
            { text: "Pas", val: 'Pas', weight: 2.5, color: '#9E9E9E' }, // Gri
            { text: "30", val: 30, weight: 3, color: '#FFEB3B' }, // Sarı
            { text: "10", val: 10, weight: 5, color: '#FF9800' }, // Turuncu
            { text: "İflas", val: 'İflas', weight: 1.2, color: '#B71C1C' }, // Koyu Kırmızı
            { text: "50", val: 50, weight: 2, color: '#03A9F4' }, // Mavi
            { text: "20", val: 20, weight: 4, color: '#8BC34A' }, // Açık Yeşil
            { text: "10", val: 10, weight: 5, color: '#FFEB3B' }, // Sarı
            { text: "Pas", val: 'Pas', weight: 2.5, color: '#9E9E9E' }, // Gri
            { text: "30", val: 30, weight: 3, color: '#FF9800' }, // Turuncu
            { text: "20", val: 20, weight: 4, color: '#4CAF50' }, // Yeşil
            { text: "100", val: 100, weight: 1.5, color: '#F44336' }, // Parlak Kırmızı
            { text: "10", val: 10, weight: 5, color: '#03A9F4' }, // Mavi
            { text: "İflas", val: 'İflas', weight: 1.2, color: '#B71C1C' }, // Koyu Kırmızı
            { text: "50", val: 50, weight: 2, color: '#FF9800' }, // Turuncu
            { text: "20", val: 20, weight: 4, color: '#8BC34A' }, // Açık Yeşil
            { text: "30", val: 30, weight: 3, color: '#FFEB3B' }, // Sarı
            { text: "Pas", val: 'Pas', weight: 2.5, color: '#9E9E9E' }  // Gri
        ];

        const totalWeight = segmentsData.reduce((sum, seg) => sum + seg.weight, 0);

        let players = [];
        let currentPlayerIndex = 0;
        let targetScore = 500;
        let rankCounter = 1;
        
        let currentRotation = 0;
        let isSpinning = false;
        let currentSegmentValue = null;

        let turnTimeLimit = 30;
        let currentTimer = 30;
        let timerInterval = null;
        let isTimerPaused = true;
        let shouldPauseTimerOnQuestion = true; 

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const outerRadius = canvas.width / 2 - 20; // Çerçeve için boşluk
        const innerRadius = outerRadius - 25; // Çark dilimleri için yarıçap

        function initSetup() { generatePlayerInputs(); }

        function generatePlayerInputs() {
            const count = document.getElementById('playerCount').value;
            const container = document.getElementById('playerNamesInputs');
            container.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                container.innerHTML += `<input type="text" id="p${i}" class="ios-input" value="Oyuncu ${i}" placeholder="Adı">`;
            }
        }

        function startGame() {
            targetScore = parseInt(document.getElementById('targetScore').value) || 500;
            turnTimeLimit = parseInt(document.getElementById('turnTime').value) || 30; 
            shouldPauseTimerOnQuestion = document.getElementById('timerPauseBehavior').value === 'pause';

            const count = document.getElementById('playerCount').value;
            players = [];
            for (let i = 1; i <= count; i++) {
                players.push({
                    id: i, name: document.getElementById(`p${i}`).value || `Oyuncu ${i}`,
                    score: 0, finished: false, rank: null
                });
            }

            document.getElementById('setupScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');

            drawWheel();
            startTurn(); 
        }

        function startTurn() {
            currentTimer = turnTimeLimit;
            isTimerPaused = false;
            updateUI();

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isTimerPaused) {
                    currentTimer--;
                    updateTimerDisplay();

                    if (currentTimer <= 0) {
                        isTimerPaused = true;
                        clearInterval(timerInterval);
                        
                        const qModal = document.getElementById('questionModal');
                        if (qModal.classList.contains('show')) {
                            qModal.classList.remove('show');
                            showTimeUpAndPass();
                        } else if (!isSpinning) {
                            showTimeUpAndPass();
                        }
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerSpan = document.getElementById('timerSpan');
            if (timerSpan) {
                timerSpan.innerText = `Kalan Süre: ${currentTimer}s`;
                timerSpan.style.color = currentTimer <= 5 ? 'var(--ios-red)' : 'var(--ios-gray)';
            }
        }

        function updateUI() {
            const activePlayer = players[currentPlayerIndex];
            document.getElementById('activePlayerDisplay').innerHTML = `
                Sıra: ${activePlayer.name} <br>
                <span id="timerSpan" style="font-size: 15px; font-weight: 600; color: var(--ios-gray); display: inline-block; margin-top: 5px;">Kalan Süre: ${currentTimer}s</span>
            `;
            updateTimerDisplay();

            const grid = document.getElementById('scoresGrid');
            grid.innerHTML = '';
            players.forEach((p, index) => {
                let classes = 'score-card';
                if (p.finished) classes += ' finished';
                else if (index === currentPlayerIndex) classes += ' active';

                grid.innerHTML += `
                    <div class="${classes}">
                        <span class="name">${p.name}</span>
                        <span class="points">${p.score}</span>
                    </div>
                `;
            });
        }

        // 3D, GÖLGELİ VE METALİK ÇERÇEVELİ YENİ ÇARK ÇİZİMİ
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. DÖNEN İÇ KISIM (Dilimler)
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(currentRotation);

            let startAngle = 0;
            for (let i = 0; i < segmentsData.length; i++) {
                let seg = segmentsData[i];
                let arcSize = (seg.weight / totalWeight) * 2 * Math.PI;
                let endAngle = startAngle + arcSize;

                // Dilim Çizimi
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, innerRadius, startAngle, endAngle, false);
                ctx.closePath();
                
                // 3D Gradient Efekti (İçe doğru hafif açılır)
                let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, innerRadius);
                grad.addColorStop(0, '#ffffff40'); // Merkeze doğru parlak
                grad.addColorStop(0.8, seg.color);
                grad.addColorStop(1, '#00000030'); // Dışa doğru gölge

                ctx.fillStyle = grad;
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.stroke();

                // Yazı Çizimi (Görseldeki gibi gölgeli ve net)
                ctx.save();
                let textAngle = startAngle + arcSize / 2;
                ctx.translate(Math.cos(textAngle) * (innerRadius * 0.90), Math.sin(textAngle) * (innerRadius * 0.90));
                ctx.rotate(textAngle + Math.PI);
                
                // Açık renklere koyu, koyu renklere açık yazı
                let isLightColor = (seg.color === '#FFEB3B' || seg.color === '#FF9800' || seg.color === '#8BC34A');
                ctx.fillStyle = isLightColor ? '#1a1a1a' : '#FFFFFF';
                
                let baseFontSize = 42; 
                let dynamicSize = Math.max(26, Math.min(baseFontSize, seg.weight * 11)); 
                ctx.font = `900 ${dynamicSize}px -apple-system`;
                ctx.textAlign = 'left'; 
                ctx.textBaseline = 'middle';
                
                // Yazılara Hafif 3D Gölge
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                
                ctx.fillText(seg.text, 0, 0); 
                ctx.restore();
                
                startAngle += arcSize;
            }
            ctx.restore(); // İç dönen kısım bitti

            // 2. SABİT DIŞ KISIM (Metalik Çerçeve, Işıklar, Merkez, İbre)
            ctx.save();
            ctx.translate(centerX, centerY);

            // -- Metalik Çerçeve --
            ctx.beginPath();
            ctx.arc(0, 0, outerRadius, 0, 2 * Math.PI);
            ctx.arc(0, 0, innerRadius, 0, 2 * Math.PI, true); // İçi boş simit
            ctx.closePath();
            
            // Çeliğe benzeyen doğrusal gradient
            let rimGrad = ctx.createLinearGradient(-outerRadius, -outerRadius, outerRadius, outerRadius);
            rimGrad.addColorStop(0, '#9e9e9e');
            rimGrad.addColorStop(0.2, '#ffffff');
            rimGrad.addColorStop(0.5, '#616161');
            rimGrad.addColorStop(0.8, '#ffffff');
            rimGrad.addColorStop(1, '#424242');
            
            ctx.fillStyle = rimGrad;
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 10;
            ctx.fill();
            
            // Çerçeve konturları
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#424242';
            ctx.stroke();

            // -- Çerçeve Üzerindeki Yuvarlak Işıklar --
            const numLights = 24;
            for(let i=0; i<numLights; i++) {
                let lightAngle = (i / numLights) * 2 * Math.PI;
                let lx = Math.cos(lightAngle) * (outerRadius - 12);
                let ly = Math.sin(lightAngle) * (outerRadius - 12);
                
                ctx.beginPath();
                ctx.arc(lx, ly, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#FFFDE7'; // Beyazımsı sarı lamba rengi
                
                // Sarı Parlama Efekti
                ctx.shadowColor = "#FFD54F";
                ctx.shadowBlur = 12;
                ctx.fill();
                
                // Lambanın etrafına ince siyah halka
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 0; // Kapat
                ctx.stroke();
            }

            // -- Merkezdeki Küresel Göbek --
            ctx.beginPath();
            ctx.arc(0, 0, 70, 0, 2 * Math.PI);
            
            // 3D Beyaz top efekti
            let centerGrad = ctx.createRadialGradient(-15, -15, 10, 0, 0, 70);
            centerGrad.addColorStop(0, '#ffffff');
            centerGrad.addColorStop(0.8, '#f5f5f5');
            centerGrad.addColorStop(1, '#bdbdbd');
            
            ctx.fillStyle = centerGrad;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 5;
            ctx.fill();
            
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#e0e0e0';
            ctx.stroke();
            
            // Merkez Yazısı "Çarkıfelek"
            ctx.fillStyle = '#212121';
            ctx.font = '800 22px -apple-system';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = "rgba(0,0,0,0)"; // Gölgeyi sıfırla
            ctx.fillText("Çarkıfelek", 0, 0);

            // -- Kırmızı ve Altın Renkli Büyük İbre (Tepede) --
            ctx.beginPath();
            ctx.moveTo(-25, -outerRadius - 10);
            ctx.lineTo(25, -outerRadius - 10);
            ctx.lineTo(0, -innerRadius + 15);
            ctx.closePath();
            
            let pointerGrad = ctx.createLinearGradient(0, -outerRadius-10, 0, -innerRadius+15);
            pointerGrad.addColorStop(0, '#D32F2F');
            pointerGrad.addColorStop(1, '#FF5252');
            
            ctx.fillStyle = pointerGrad;
            ctx.shadowColor = "rgba(0,0,0,0.6)";
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 5;
            ctx.fill();
            
            // Altın rengi ibre çerçevesi
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#FFC107';
            ctx.stroke();

            ctx.restore();
        }

        let isDragging = false;
        let startDragAngle = 0;
        let initialRotation = 0;
        let angularVelocity = 0;
        let lastTime = 0;
        let lastAngle = 0;
        let animationFrame;

        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            if (e.touches && e.touches.length > 0) {
                return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
            }
            return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
        }

        function calculateAngle(pos) { return Math.atan2(pos.y - centerY, pos.x - centerX); }

        function startDrag(e) {
            if (isSpinning || isTimerPaused) return; 
            isDragging = true;
            cancelAnimationFrame(animationFrame);
            const pos = getEventPos(e);
            startDragAngle = calculateAngle(pos);
            initialRotation = currentRotation;
            lastAngle = startDragAngle;
            lastTime = performance.now();
            angularVelocity = 0;
        }

        function moveDrag(e) {
            if (!isDragging) return;
            e.preventDefault(); 
            const pos = getEventPos(e);
            const angle = calculateAngle(pos);
            const deltaAngle = angle - startDragAngle;
            currentRotation = initialRotation + deltaAngle;
            
            const now = performance.now();
            const dt = now - lastTime;
            if (dt > 0) {
                let deltaLast = angle - lastAngle;
                if (deltaLast > Math.PI) deltaLast -= 2 * Math.PI;
                if (deltaLast < -Math.PI) deltaLast += 2 * Math.PI;
                angularVelocity = (deltaLast / dt) * 16; 
            }
            lastAngle = angle;
            lastTime = now;
            drawWheel();
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            if (Math.abs(angularVelocity) > 0.05) {
                isSpinning = true;
                spinWheel();
            } else {
                checkSegment();
            }
        }

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', startDrag, {passive: false});
        window.addEventListener('touchmove', moveDrag, {passive: false});
        window.addEventListener('touchend', endDrag);

        function spinWheel() {
            currentRotation += angularVelocity;
            angularVelocity *= 0.985; 
            drawWheel();

            if (Math.abs(angularVelocity) < 0.001) {
                isSpinning = false;
                checkSegment();
            } else {
                animationFrame = requestAnimationFrame(spinWheel);
            }
        }

        function checkSegment() {
            let targetAngle = (3 * Math.PI / 2 - currentRotation) % (2 * Math.PI);
            if (targetAngle < 0) targetAngle += 2 * Math.PI;

            let currentAccAngle = 0;
            for (let i = 0; i < segmentsData.length; i++) {
                let arcSize = (segmentsData[i].weight / totalWeight) * 2 * Math.PI;
                if (targetAngle >= currentAccAngle && targetAngle < currentAccAngle + arcSize) {
                    currentSegmentValue = segmentsData[i].val;
                    break;
                }
                currentAccAngle += arcSize;
            }
            processTurnResult();
        }

        function processTurnResult() {
            if (shouldPauseTimerOnQuestion) {
                isTimerPaused = true; 
            }

            if (currentSegmentValue === 'Pas') {
                isTimerPaused = true; 
                showAlert('Pas!', 'Sıra sonraki oyuncuya geçti.');
            } else if (currentSegmentValue === 'İflas') {
                isTimerPaused = true; 
                showAlert('İflas!', 'Tüm puanını kaybettin! Sıra sonraki oyuncuda.', true);
            } else {
                showQuestion(currentSegmentValue);
            }
        }

        function showAlert(title, text, isBankrupt = false) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertText').innerHTML = text; 
            const modal = document.getElementById('alertModal');
            modal.classList.add('show');
            modal.dataset.bankrupt = isBankrupt;
        }

        function closeAlertAndNext() {
            const modal = document.getElementById('alertModal');
            modal.classList.remove('show');
            
            if (modal.dataset.bankrupt === "true") {
                players[currentPlayerIndex].score = 0;
            }
            nextTurn(); 
        }

        function showTimeUpAndPass() {
            let activeCount = players.filter(p => !p.finished).length;
            if (activeCount > 1) {
                let nextIndex = currentPlayerIndex;
                do {
                    nextIndex = (nextIndex + 1) % players.length;
                } while (players[nextIndex].finished);
                
                let nextName = players[nextIndex].name;
                let customText = `Sıra <br><span style="color:var(--ios-red); font-size:28px; font-weight:900; line-height:2;">${nextName}</span><br> adlı oyuncuya geçiyor!`;
                
                showAlert('⏳ SÜRE DOLDU!', customText, false);
            } else {
                nextTurn(); 
            }
        }

        function showQuestion(points) {
            const randomQ = quizData[Math.floor(Math.random() * quizData.length)];
            document.getElementById('questionValueTitle').innerText = `${points} Puanlık Soru`;
            document.getElementById('questionText').innerText = randomQ.q;
            document.getElementById('answerText').innerText = `Cevap: ${randomQ.a}`;
            
            document.getElementById('answerWrapper').classList.remove('revealed');
            document.getElementById('questionModal').classList.add('show');
        }

        function revealAnswer() {
            document.getElementById('answerWrapper').classList.add('revealed');
        }

        function handleAnswer(isCorrect) {
            document.getElementById('questionModal').classList.remove('show');
            
            if (isCorrect) {
                players[currentPlayerIndex].score += currentSegmentValue;
                if (players[currentPlayerIndex].score >= targetScore) {
                    players[currentPlayerIndex].finished = true;
                    players[currentPlayerIndex].rank = rankCounter++;
                }
            }
            
            let activeCount = players.filter(p => !p.finished).length;
            if (players[currentPlayerIndex].finished || activeCount <= 1) {
                nextTurn();
                return;
            }

            if (currentTimer <= 0) {
                showTimeUpAndPass();
            } else {
                isTimerPaused = false; 
                updateUI();
            }
        }

        function nextTurn() {
            clearInterval(timerInterval); 

            let activeCount = players.filter(p => !p.finished).length;
            if (activeCount === 0 || (players.length > 1 && activeCount === 1)) {
                let lastPlayer = players.find(p => !p.finished);
                if (lastPlayer) {
                    lastPlayer.finished = true;
                    lastPlayer.rank = rankCounter++;
                }
                showLeaderboard();
                return;
            }

            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            } while (players[currentPlayerIndex].finished);

            startTurn(); 
        }

        function showLeaderboard() {
            isTimerPaused = true;
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('leaderboardScreen').classList.add('active');
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';
            
            const sortedPlayers = [...players].sort((a, b) => b.score - a.score);
            
            sortedPlayers.forEach((p, index) => {
                p.rank = index + 1;
                let rankClass = p.rank <= 3 ? `rank-${p.rank}` : '';
                list.innerHTML += `<div class="leaderboard-item ${rankClass}"><span>${p.rank}. ${p.name}</span><span>${p.score}</span></div>`;
            });

            createConfetti();
        }

        function createConfetti() {
            const colors = ['#FFD54F', '#4CAF50', '#29B6F6', '#EF5350', '#AB47BC'];
            for(let i=0; i<80; i++) {
                let conf = document.createElement('div');
                conf.style.position = 'fixed';
                conf.style.width = Math.random() * 10 + 7 + 'px'; 
                conf.style.height = conf.style.width;
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-10px';
                conf.style.zIndex = '999';
                conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                conf.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(conf);
                
                conf.addEventListener('animationend', function() {
                    this.remove();
                });
            }
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        initSetup();
    </script>
</body>
</html>
